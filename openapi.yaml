openapi: 3.1.0

info:
  title: Bruno Operador - Tasks API
  version: "1.0"
  description: API para registar e consultar tarefas diárias.

servers:
  - url: https://bruno-receita-api.onrender.com

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    Task:
      type: object
      required: [date, title, priority]
      properties:
        date:
          type: string
          description: YYYY-MM-DD
        title:
          type: string
        priority:
          type: string
          enum: [alta, media, baixa]

    CreateTasksRequest:
      type: object
      required: [tasks]
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"

security:
  - bearerAuth: []

paths:
  /tasks:
    post:
      operationId: createTasks
      summary: Criar tarefas diárias
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTasksRequest"
      responses:
        "200
